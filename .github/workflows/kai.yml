name: Kai (Kodif AI)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  kai:
    if: contains(github.event.comment.body, '@kai')
    runs-on: ubuntu-latest
    steps:
      - uses: er-zhi/kai@v1
