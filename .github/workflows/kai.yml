name: Kai (Kodif AI)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  kai:
    if: |
      contains(github.event.comment.body, '@kai') &&
      !contains(github.event.comment.user.login, '[bot]') &&
      !contains(github.event.comment.user.login, 'kodif-ai')
    runs-on: [self-hosted, kai]
    # Concurrency removed: simplified action runs in <2s, no long-running CLI
    steps:
      - uses: actions/create-github-app-token@v1
        id: kai-token
        with:
          app-id: 3394026
          private-key: ${{ secrets.KAI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: er-zhi/kai@v1
        with:
          github_token: ${{ steps.kai-token.outputs.token }}
          router_url: http://kai-router:8080
