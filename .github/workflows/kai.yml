name: Kai (Kodif AI)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  kai:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@kai')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@kai')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@kai'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@kai"
          model: "sonnet"
          timeout_minutes: 30
