name: Kai (Kodif AI)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: kai-pr-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  kai:
    if: contains(github.event.comment.body, '@kai')
    runs-on: [self-hosted, kai]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/create-github-app-token@v1
        id: kai-token
        with:
          app-id: 3394026
          private-key: ${{ secrets.KAI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: er-zhi/kai@v1
        with:
          github_token: ${{ steps.kai-token.outputs.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
