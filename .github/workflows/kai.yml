name: Kai (Kodif AI)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  kai:
    if: contains(github.event.comment.body, '@kai')
    runs-on: [self-hosted, kai]
    steps:
      - uses: er-zhi/kai@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
