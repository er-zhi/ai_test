name: Kai (Kodif AI)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  kai:
    if: contains(github.event.comment.body, '@kai')
    runs-on: [self-hosted, kai]
    steps:
      - uses: er-zhi/kai@v1
        with:
          app_id: ${{ secrets.KAI_APP_ID }}
          app_private_key: ${{ secrets.KAI_APP_PRIVATE_KEY }}
